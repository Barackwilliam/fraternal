<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — JamiiBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .box{background:#fff;border-radius:18px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.1)}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
    .logo-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-name{font-size:20px;font-weight:800;color:#1e293b}
    h2{font-size:20px;font-weight:800;color:#1e293b;text-align:center;margin-bottom:4px}
    .sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
    .msg{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
    .f-group{margin-bottom:16px}
    .f-label{display:block;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
    .f-input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all .2s;color:#1e293b}
    .f-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:4px;transition:all .2s}
    .btn:hover{opacity:.9}
    .links{display:flex;justify-content:space-between;margin-top:16px;font-size:13px}
    .links a{color:#4f46e5;font-weight:600}
    .divider{border:none;border-top:1px solid #f1f5f9;margin:18px 0}
    .register-btn{display:block;text-align:center;padding:11px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:700;color:#374151;transition:all .2s}
    .register-btn:hover{border-color:#4f46e5;color:#4f46e5}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark">🤖</div>
    <span class="logo-name">JamiiBot</span>
  </div>
  <h2>Welcome back</h2>
  <div class="sub">Sign in to manage your WhatsApp bot</div>

  {% if messages %}
  {% for m in messages %}
  <div class="msg"><i class="fas fa-circle-xmark"></i> {{ m }}</div>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="f-group">
      <label class="f-label">Username</label>
      <input type="text" name="username" class="f-input" placeholder="Your username" required autofocus>
    </div>
    <div class="f-group">
      <label class="f-label">Password</label>
      <input type="password" name="password" class="f-input" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </form>

  <div class="links">
    <a href="/bot/">← Back to JamiiBot</a>
    <a href="https://wa.me/255750910158">Need help?</a>
  </div>

  <div class="divider"></div>
  <a href="/chatbot/register/" class="register-btn">Don't have an account? <strong>Register Free →</strong></a>
</div>
</body>
</html>
