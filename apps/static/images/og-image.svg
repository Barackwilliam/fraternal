<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00010a"/>
      <stop offset="50%" style="stop-color:#020818"/>
      <stop offset="100%" style="stop-color:#040918"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8ff"/>
      <stop offset="50%" style="stop-color:#b44dff"/>
      <stop offset="100%" style="stop-color:#ff2d8a"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25d366"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#5b6ef5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#25d366;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#00c8ff" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="url(#botGrad)"/>

  <!-- Top left badge -->
  <rect x="60" y="48" width="180" height="32" rx="16" fill="rgba(0,200,255,0.08)" stroke="#00c8ff" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="80" cy="64" r="5" fill="#00ff88"/>
  <text x="92" y="68" font-family="monospace" font-size="11" fill="rgba(0,200,255,0.8)" letter-spacing="2">JAMIITEK.COM</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Web Development</text>
  <text x="60" y="285" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" letter-spacing="-1.5">
    <tspan fill="url(#titleGrad)">&amp; AI WhatsApp</tspan>
  </text>
  <text x="60" y="365" font-family="Arial Black, sans-serif" font-size="62" font-weight="900">
    <tspan fill="url(#botGrad)">Bots Tanzania</tspan>
  </text>

  <!-- Subtitle -->
  <text x="62" y="415" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">Websites · AI Bots · Hosting · Domains · Mobile Apps</text>
  <text x="62" y="442" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">Dar es Salaam, Tanzania · Swahili + English</text>

  <!-- Bot badge - right side -->
  <rect x="820" y="200" width="320" height="180" rx="20" fill="rgba(37,211,102,0.06)" stroke="rgba(37,211,102,0.2)" stroke-width="1.5"/>
  <rect x="820" y="200" width="320" height="3" rx="1.5" fill="url(#botGrad)"/>
  <text x="840" y="245" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">JamiiBot</text>
  <text x="840" y="272" font-family="monospace" font-size="11" fill="rgba(37,211,102,0.7)" letter-spacing="1">AI WHATSAPP BOT</text>
  <text x="840" y="306" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">✓ Swahili + English</text>
  <text x="840" y="328" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">✓ Responds 24/7</text>
  <text x="840" y="350" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)">✓ From TZS 15,000/mo</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.4)"/>
  <text x="60" y="612" font-family="monospace" font-size="13" fill="rgba(0,200,255,0.6)" letter-spacing="1">jamiitek.com</text>
  <text x="400" y="612" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">+255 750 910 158</text>
  <text x="650" y="612" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">info@jamiitek.com</text>
  <text x="920" y="612" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.2)">Tanzania &amp; East Africa</text>
</svg>
