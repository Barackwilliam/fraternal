{% extends 'management/base.html' %}
{% block title %}Send Message — {{ website.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <a href="{% url 'website_detail' website.pk %}" class="jt-btn btn-ghost btn-icon"><i class="fas fa-arrow-left"></i></a>
      <h1 style="font-family:var(--head);font-size:20px;font-weight:800;color:var(--text)">Send Message — {{ website.name }}</h1>
    </div>
    <div class="jt-card">
      <div class="jt-card-body">
        <!-- Quick Templates -->
        <div style="margin-bottom:20px">
          <div style="font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Quick Templates</div>
          <div style="display:flex;flex-wrap:wrap;gap:7px">
            <button type="button" onclick="fill('Payment Reminder','Dear {{ website.client.name }},\n\nThis is a reminder that your hosting payment for {{ website.name }} is due.\n\nPlease make your payment of TZS {{ website.monthly_cost|floatformat:0 }} to NMB Bank Account: 21410034200 (JamiiTek Technologies).\n\nUse your name as payment reference.\n\nThank you!\nJamiiTek Team')" class="jt-btn btn-ghost" style="font-size:12px">💰 Payment Reminder</button>
            <button type="button" onclick="fill('Invoice — {{ website.name }}','Dear {{ website.client.name }},\n\nPlease find your hosting invoice below.\n\nWebsite: {{ website.name }}\nURL: {{ website.url }}\nAmount: TZS {{ website.monthly_cost|floatformat:0 }}/month\nValid Until: {{ website.hosting_end_date|date:\"d M Y\" }}\n\nPay to NMB Account 21410034200 (JamiiTek Technologies)\n\nThank you!\nJamiiTek Team')" class="jt-btn btn-ghost" style="font-size:12px">🧾 Invoice</button>
            <button type="button" onclick="fill('Website Update Notice','Dear {{ website.client.name }},\n\nWe have an update regarding your website {{ website.name }}.\n\n[Describe the update here]\n\nIf you have any questions, feel free to contact us.\n\nJamiiTek Team')" class="jt-btn btn-ghost" style="font-size:12px">📢 Update</button>
            <button type="button" onclick="fill('Expiry Warning — {{ website.name }}','Dear {{ website.client.name }},\n\nYour hosting for {{ website.name }} is expiring soon on {{ website.hosting_end_date|date:\"d M Y\" }}.\n\nPlease renew your hosting to avoid service interruption.\n\nMonthly cost: TZS {{ website.monthly_cost|floatformat:0 }}\nPay to: NMB Bank 21410034200\n\nJamiiTek Team')" class="jt-btn btn-ghost" style="font-size:12px">⏰ Expiry Warning</button>
          </div>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="f-label">Message Type</label>
            <select name="notification_type" class="f-input">
              {% for val, label in notification_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="f-label">Subject *</label>
            <input type="text" name="subject" id="subj" class="f-input" placeholder="Message subject..." required>
          </div>
          <div class="mb-4">
            <label class="f-label">Message *</label>
            <textarea name="message" id="body" class="f-input" style="min-height:200px" placeholder="Write your message to {{ website.client.name }}..." required></textarea>
          </div>
          <div style="display:flex;gap:10px">
            <button type="submit" class="jt-btn btn-cyan"><i class="fas fa-paper-plane"></i> Send to {{ website.client.name }}</button>
            <a href="{% url 'website_detail' website.pk %}" class="jt-btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function fill(subj, body) {
  document.getElementById('subj').value = subj;
  document.getElementById('body').value = body;
}
</script>
{% endblock %}
