{% extends 'management/base.html' %}
{% block title %}Edit — {{ website.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <a href="{% url 'website_detail' website.pk %}" class="jt-btn btn-ghost btn-icon"><i class="fas fa-arrow-left"></i></a>
      <h1 style="font-family:var(--head);font-size:20px;font-weight:800;color:var(--text)">Edit — {{ website.name }}</h1>
    </div>
    <div class="jt-card">
      <div class="jt-card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6"><label class="f-label">Website Name *</label><input type="text" name="name" class="f-input" value="{{ website.name }}" required></div>
            <div class="col-md-6">
              <label class="f-label">Site Type</label>
              <select name="site_type" class="f-input">
                <option value="static" {% if website.site_type == 'static' %}selected{% endif %}>Static HTML/CSS</option>
                <option value="django" {% if website.site_type == 'django' %}selected{% endif %}>Django</option>
                <option value="wordpress" {% if website.site_type == 'wordpress' %}selected{% endif %}>WordPress</option>
                <option value="other" {% if website.site_type == 'other' %}selected{% endif %}>Other</option>
              </select>
            </div>
            <div class="col-12"><label class="f-label">URL *</label><input type="url" name="url" class="f-input" value="{{ website.url }}" required></div>
            <div class="col-md-6"><label class="f-label">Hosting End Date</label><input type="date" name="hosting_end_date" class="f-input" value="{{ website.hosting_end_date|date:'Y-m-d' }}"></div>
            <div class="col-md-6"><label class="f-label">Monthly Cost (TZS)</label><input type="number" name="monthly_cost" class="f-input" value="{{ website.monthly_cost }}"></div>
            <div class="col-12"><label class="f-label">Internal Notes</label><textarea name="notes" class="f-input">{{ website.notes }}</textarea></div>
            <div class="col-12" style="display:flex;flex-direction:column;gap:12px">
              <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:var(--text-2)"><input type="checkbox" name="auto_suspend_on_expiry" {% if website.auto_suspend_on_expiry %}checked{% endif %} style="width:16px;height:16px;accent-color:var(--cyan)"><span>Auto-suspend on expiry</span></label>
              <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:var(--text-2)"><input type="checkbox" name="send_expiry_warnings" {% if website.send_expiry_warnings %}checked{% endif %} style="width:16px;height:16px;accent-color:var(--cyan)"><span>Send expiry warnings</span></label>
            </div>
            <div class="col-12" style="border-top:1px solid var(--border);padding-top:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
              <div style="display:flex;gap:10px">
                <button type="submit" class="jt-btn btn-cyan"><i class="fas fa-save"></i> Save Changes</button>
                <a href="{% url 'website_detail' website.pk %}" class="jt-btn btn-ghost">Cancel</a>
              </div>
              <form method="post" action="{% url 'regenerate_api_key' website.pk %}" onsubmit="return confirm('This will break the current integration! Proceed?')">
                {% csrf_token %}
                <button type="submit" class="jt-btn btn-red"><i class="fas fa-rotate"></i> Regenerate API Key</button>
              </form>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
