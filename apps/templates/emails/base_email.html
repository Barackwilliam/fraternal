<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject }}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f2f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; color:#1a1a2e; }
  .wrap { max-width:600px; margin:0 auto; padding:32px 16px; }
  .card { background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.08); }

  /* Header */
  .hdr { background:linear-gradient(135deg,#050810,#0d1230); padding:36px 40px; text-align:center; }
  .hdr-logo { font-size:22px; font-weight:800; color:#ffffff; letter-spacing:-0.5px; }
  .hdr-logo span { color:#00d4ff; }
  .hdr-tagline { font-size:11px; color:rgba(0,212,255,0.5); letter-spacing:3px; text-transform:uppercase; margin-top:6px; }

  /* Accent bar */
  .accent { height:3px; background:linear-gradient(90deg,#00d4ff,#8b5cf6,#ff2d8a); }

  /* Body */
  .body { padding:40px 40px 32px; }
  .greeting { font-size:20px; font-weight:700; color:#0d1230; margin-bottom:16px; }
  .body p { font-size:15px; color:#4a5568; line-height:1.75; margin-bottom:14px; }
  .body p:last-of-type { margin-bottom:0; }

  /* Info box */
  .info-box { background:#f7f8fc; border:1px solid #e8eaf0; border-radius:12px; padding:20px 24px; margin:24px 0; }
  .info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #eef0f6; font-size:14px; }
  .info-row:last-child { border-bottom:none; padding-bottom:0; }
  .info-label { color:#718096; font-weight:500; }
  .info-value { color:#1a1a2e; font-weight:700; text-align:right; }

  /* Alert boxes */
  .alert { border-radius:10px; padding:16px 20px; margin:20px 0; font-size:14px; line-height:1.65; }
  .alert-warning { background:#fffbeb; border-left:4px solid #f59e0b; color:#92400e; }
  .alert-danger  { background:#fef2f2; border-left:4px solid #ef4444; color:#991b1b; }
  .alert-success { background:#f0fdf4; border-left:4px solid #22c55e; color:#166534; }
  .alert-info    { background:#eff6ff; border-left:4px solid #3b82f6; color:#1e40af; }
  .alert strong  { display:block; margin-bottom:4px; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; }

  /* CTA Button */
  .btn-wrap { text-align:center; margin:28px 0 8px; }
  .btn { display:inline-block; padding:14px 32px; border-radius:10px; font-size:15px; font-weight:700; text-decoration:none; color:#ffffff !important; background:linear-gradient(135deg,#5b6ef5,#8b5cf6); }
  .btn-cyan { background:linear-gradient(135deg,#00d4ff,#5b6ef5); color:#000 !important; }

  /* Divider */
  .divider { height:1px; background:#eef0f6; margin:28px 0; }

  /* Footer */
  .footer { padding:24px 40px 32px; text-align:center; }
  .footer p { font-size:12px; color:#a0aec0; line-height:1.7; }
  .footer a { color:#5b6ef5; text-decoration:none; }
  .footer-brand { font-size:11px; color:#cbd5e0; letter-spacing:2px; text-transform:uppercase; margin-top:16px; }

  @media(max-width:600px){
    .body,.footer{ padding:28px 24px; }
    .hdr{ padding:28px 24px; }
    .info-row{ flex-direction:column; align-items:flex-start; gap:4px; }
    .info-value{ text-align:left; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <div class="hdr-logo">Jamii<span>Tek</span></div>
      <div class="hdr-tagline">Digital Solutions · Tanzania</div>
    </div>
    <div class="accent"></div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <div class="divider"></div>
      <p>This email was sent by JamiiTek Technologies.<br>
      If you have questions, contact us at <a href="mailto:info@jamiitek.co.tz">info@jamiitek.co.tz</a><br>
      or call <strong>+255 XXX XXX XXX</strong></p>
      <div class="footer-brand">© 2025 JamiiTek Technologies — Dar es Salaam</div>
    </div>
  </div>
</div>
</body>
</html>
