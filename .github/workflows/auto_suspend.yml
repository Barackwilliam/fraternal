name: Auto-Suspend Expired Hosting

on:
  schedule:
    # Kila siku saa 3:00 asubuhi Tanzania (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not change anything)'
        type: boolean
        default: false

jobs:
  auto-suspend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-suspend
        run: |
          python manage.py auto_suspend ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DJANGO_SETTINGS_MODULE: ebenezeri.settings
