{% extends 'builder/base_panel.html' %}
{% block title %}New Website{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div class="topbar"><h1>New Website</h1></div>
  {% if error %}<div class="msg error">{{ error }}</div>{% endif %}
  <form method="post" class="card">
    {% csrf_token %}
    <label>Business / Website Name</label>
    <input type="text" name="site_name" required placeholder="e.g. Mama Ntilie Kitchen">
    <label>Subdomain</label>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <input type="text" name="subdomain" required style="flex:1;min-width:160px"
             pattern="[a-z0-9]([a-z0-9-]{1,48}[a-z0-9])?">
      <span style="font-weight:700;color:var(--muted);white-space:nowrap">.jamiitek.com</span>
    </div>
    <label>Website Type</label>
    <select name="website_type">
      {% for t in website_types %}<option value="{{ t.key }}">{{ t.label }}</option>{% endfor %}
    </select>
    <button class="btn amber" style="margin-top:22px;width:100%;justify-content:center">Create Website</button>
  </form>
</div>
{% endblock %}
