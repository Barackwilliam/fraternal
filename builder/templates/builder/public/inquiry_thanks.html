<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — {{ site.site_name }}</title>
<meta name="robots" content="noindex">
<style>
:root{--accent:{{ site.accent_color|default:'#e8a13c' }}}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;margin:0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;background:#f6f4ef;color:#232323;padding:20px}
.box{max-width:480px;text-align:center;background:#fff;border:1px solid rgba(0,0,0,.07);
  border-radius:20px;padding:44px 32px;box-shadow:0 14px 44px rgba(20,30,20,.1)}
.tick{width:74px;height:74px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;
  justify-content:center;font-size:34px;background:color-mix(in srgb,var(--accent) 16%,#fff);
  border:2px solid var(--accent)}
h1{font-size:24px;margin:0 0 10px}
p{color:#6b7268;line-height:1.7;margin:0 0 24px;font-size:15px}
a.btn{display:inline-block;background:var(--accent);color:#1c1508;padding:13px 30px;border-radius:11px;
  text-decoration:none;font-weight:800;font-size:15px}
</style>
</head>
<body>
<div class="box">
  <div class="tick">✅</div>
  <h1>Thank you{% if name %}, {{ name }}{% endif %}!</h1>
  <p>Your inquiry has been received by <b>{{ site.site_name }}</b> — we will contact you as soon as possible.</p>
  <a class="btn" href="/">← Back to {{ site.site_name }}</a>
</div>
</body>
</html>
